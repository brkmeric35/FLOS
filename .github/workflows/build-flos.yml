name: Build FlOS Hyprland ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Araclari Kur
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            debootstrap xorriso squashfs-tools \
            grub-pc-bin grub-efi-amd64-bin mtools isolinux syslinux-common

      - name: Debian Base Sistem (sid)
        run: |
          sudo debootstrap --arch=amd64 sid /mnt/flos http://deb.debian.org/debian

      - name: Sources List
        run: |
          sudo tee /mnt/flos/etc/apt/sources.list > /dev/null << 'EOF'
          deb http://deb.debian.org/debian sid main contrib non-free non-free-firmware
          EOF

      - name: Temel Paketleri Kur
        run: |
          sudo cp /etc/resolv.conf /mnt/flos/etc/resolv.conf
          sudo chroot /mnt/flos apt-get update -qq
          sudo chroot /mnt/flos apt-get install -y \
            linux-image-amd64 \
            live-boot \
            live-boot-initramfs-tools \
            systemd-sysv \
            dbus \
            locales \
            login \
            passwd \
            sudo \
            bash \
            ca-certificates \
            network-manager \
            openssh-server \
            vim-tiny \
            tmux \
            fastfetch \
            open-vm-tools \
            open-vm-tools-desktop

      - name: Hyprland ve Wayland Kur
        run: |
          sudo chroot /mnt/flos apt-get install -y \
            hyprland \
            xdg-desktop-portal-hyprland \
            waybar \
            kitty \
            wofi \
            wl-clipboard \
            grim \
            slurp \
            mako-notifier \
            pipewire \
            pipewire-pulse \
            wireplumber \
            fonts-noto \
            papirus-icon-theme \
            thunar \
            sddm \
            polkit-kde-agent-1 \
            qt6-wayland \
            network-manager-gnome

      - name: OS Adini FlOS Yap
        run: |
          printf 'PRETTY_NAME="FlOS"\nNAME="FlOS"\nVERSION="1.0"\nID=flos\nID_LIKE=debian\nVERSION_ID="1.0"\nLOGO=debian-logo\n' | sudo tee /mnt/flos/etc/os-release

      - name: Hostname ve Hosts
        run: |
          echo 'flos' | sudo tee /mnt/flos/etc/hostname
          printf '127.0.0.1\tlocalhost\n127.0.1.1\tflos\n' | sudo tee /mnt/flos/etc/hosts

      - name: Kullanici Olustur
        run: |
          sudo chroot /mnt/flos /bin/bash -c "
            useradd -m -s /bin/bash -G sudo,video,audio,input,render user
            echo 'user:flos' | chpasswd
            echo 'root:flos' | chpasswd
          "

      - name: Hyprland Konfig
        run: |
          sudo mkdir -p /mnt/flos/home/user/.config/hypr
          sudo tee /mnt/flos/home/user/.config/hypr/hyprland.conf > /dev/null << 'EOF'
          monitor=,preferred,auto,1

          exec-once = waybar
          exec-once = mako
          exec-once = /usr/lib/polkit-kde-authentication-agent-1
          exec-once = pipewire
          exec-once = wireplumber

          input {
              kb_layout = tr
              follow_mouse = 1
          }

          general {
              gaps_in = 5
              gaps_out = 10
              border_size = 2
              col.active_border = rgba(89b4faee) rgba(cba6f7ee) 45deg
              col.inactive_border = rgba(595959aa)
              layout = dwindle
          }

          decoration {
              rounding = 10
              blur {
                  enabled = true
                  size = 5
                  passes = 2
              }
              drop_shadow = true
              shadow_range = 10
          }

          animations {
              enabled = true
              bezier = myBezier, 0.05, 0.9, 0.1, 1.05
              animation = windows, 1, 5, myBezier
              animation = fade, 1, 7, default
              animation = workspaces, 1, 6, default
          }

          dwindle {
              pseudotile = true
              preserve_split = true
          }

          $mainMod = SUPER

          bind = $mainMod, Return, exec, kitty
          bind = $mainMod, Q, killactive,
          bind = $mainMod, M, exit,
          bind = $mainMod, E, exec, thunar
          bind = $mainMod, Space, exec, wofi --show drun
          bind = $mainMod, F, fullscreen,
          bind = $mainMod, V, togglefloating,

          bind = $mainMod, 1, workspace, 1
          bind = $mainMod, 2, workspace, 2
          bind = $mainMod, 3, workspace, 3
          bind = $mainMod, 4, workspace, 4
          bind = $mainMod, 5, workspace, 5

          bind = $mainMod SHIFT, 1, movetoworkspace, 1
          bind = $mainMod SHIFT, 2, movetoworkspace, 2
          bind = $mainMod SHIFT, 3, movetoworkspace, 3
          bind = $mainMod SHIFT, 4, movetoworkspace, 4
          bind = $mainMod SHIFT, 5, movetoworkspace, 5

          bind = $mainMod, h, movefocus, l
          bind = $mainMod, l, movefocus, r
          bind = $mainMod, k, movefocus, u
          bind = $mainMod, j, movefocus, d

          bindm = $mainMod, mouse:272, movewindow
          bindm = $mainMod, mouse:273, resizewindow
          EOF
          sudo chroot /mnt/flos chown -R user:user /home/user/.config

      - name: Waybar Konfig
        run: |
          sudo mkdir -p /mnt/flos/home/user/.config/waybar
          sudo tee /mnt/flos/home/user/.config/waybar/config > /dev/null << 'EOF'
          {
              "layer": "top",
              "position": "top",
              "height": 35,
              "modules-left": ["hyprland/workspaces"],
              "modules-center": ["clock"],
              "modules-right": ["cpu", "memory", "network", "pulseaudio"],
              "hyprland/workspaces": { "format": "{id}" },
              "clock": { "format": "{:%H:%M  %d.%m.%Y}" },
              "cpu": { "format": " {usage}%" },
              "memory": { "format": " {}%" },
              "network": {
                  "format-wifi": " {signalStrength}%",
                  "format-ethernet": " OK",
                  "format-disconnected": "X"
              },
              "pulseaudio": { "format": " {volume}%" }
          }
          EOF
          sudo chroot /mnt/flos chown -R user:user /home/user/.config/waybar

      - name: Fastfetch Yapilandir
        run: |
          sudo mkdir -p /mnt/flos/home/user/.config/fastfetch
          sudo tee /mnt/flos/home/user/.config/fastfetch/config.jsonc > /dev/null << 'EOF'
          {
            "logo": { "source": "debian" },
            "modules": ["os","kernel","uptime","packages","shell","cpu","memory"]
          }
          EOF
          echo 'fastfetch' | sudo tee -a /mnt/flos/etc/bash.bashrc
          sudo chroot /mnt/flos chown -R user:user /home/user/.config/fastfetch

      - name: SDDM ve NetworkManager Etkinlestir
        run: |
          sudo chroot /mnt/flos systemctl enable sddm
          sudo chroot /mnt/flos systemctl enable NetworkManager

      - name: Locale
        run: |
          echo 'en_US.UTF-8 UTF-8' | sudo tee /mnt/flos/etc/locale.gen
          sudo chroot /mnt/flos locale-gen
          echo 'LANG=en_US.UTF-8' | sudo tee /mnt/flos/etc/locale.conf

      - name: Initramfs Guncelle
        run: |
          sudo chroot /mnt/flos update-initramfs -u -k all

      - name: ISO Dizin Yapisi
        run: mkdir -p iso_root/{live,boot/grub}

      - name: SquashFS Olustur
        run: |
          sudo mksquashfs /mnt/flos iso_root/live/filesystem.squashfs \
            -e boot -comp xz -noappend

      - name: Kernel ve Initrd Kopyala
        run: |
          sudo cp $(ls /mnt/flos/boot/vmlinuz-* | sort | tail -1) iso_root/live/vmlinuz
          sudo cp $(ls /mnt/flos/boot/initrd.img-* | sort | tail -1) iso_root/live/initrd.img

      - name: GRUB Config
        run: |
          sudo tee iso_root/boot/grub/grub.cfg > /dev/null << 'EOF'
          set default=0
          set timeout=5
          menuentry "FlOS - Hyprland" {
              linux  /live/vmlinuz boot=live components quiet
              initrd /live/initrd.img
          }
          EOF

      - name: ISO Olustur
        run: sudo grub-mkrescue -o FlOS-Hyprland.iso iso_root

      - name: ISO Boyutu
        run: ls -lh FlOS-Hyprland.iso

      - name: ISO Yukle
        uses: actions/upload-artifact@v4
        with:
          name: FlOS-Hyprland-ISO
          path: FlOS-Hyprland.iso
          retention-days: 7
