name: Build FlOS 1 KDE ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Repoyu Cek (logo icin)
        uses: actions/checkout@v4

      - name: Araclari Kur
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            debootstrap xorriso squashfs-tools \
            grub-pc-bin grub-efi-amd64-bin mtools isolinux syslinux-common imagemagick

      - name: Debian Base Sistem
        run: |
          sudo debootstrap --arch=amd64 bookworm /mnt/flos http://deb.debian.org/debian

      - name: Sources List
        run: |
          sudo tee /mnt/flos/etc/apt/sources.list > /dev/null << 'EOF'
          deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware
          EOF

      - name: Temel Paketleri Kur
        run: |
          sudo cp /etc/resolv.conf /mnt/flos/etc/resolv.conf
          sudo chroot /mnt/flos apt-get update -qq
          sudo chroot /mnt/flos apt-get install -y \
            linux-image-amd64 \
            live-boot \
            live-boot-initramfs-tools \
            systemd-sysv \
            dbus \
            locales \
            login \
            passwd \
            sudo \
            bash \
            ca-certificates \
            network-manager \
            openssh-server \
            open-vm-tools \
            open-vm-tools-desktop \
            plymouth \
            plymouth-themes

      - name: KDE Plasma Kur
        run: |
          sudo chroot /mnt/flos apt-get install -y \
            kde-plasma-desktop \
            sddm \
            konsole \
            dolphin \
            kate \
            ark \
            gwenview \
            plasma-nm \
            plasma-pa \
            kscreen \
            firefox-esr \
            fonts-noto \
            papirus-icon-theme \
            neofetch \
            calamares \
            calamares-settings-debian \
            python3 \
            python3-yaml \
            parted \
            os-prober \
            grub-pc

      - name: Debian Markasini Kaldir
        run: |
          sudo chroot /mnt/flos apt-get remove -y desktop-base 2>/dev/null || true
          sudo rm -rf /mnt/flos/usr/share/desktop-base 2>/dev/null || true

      - name: Logo ve Duvar Kagidi Hazirla
        run: |
          # Logoyu repodan al
          cp flos-logo.png /tmp/flos-logo.png

          # Duvar kagidi: siyah zemin + logo ortada
          convert -size 1920x1080 xc:#0d1117 \
            \( /tmp/flos-logo.png -resize 400x400 \) \
            -gravity center -composite \
            /tmp/flos-wallpaper.png

          # Plymouth icin kucuk logo
          convert /tmp/flos-logo.png -resize 256x256 /tmp/flos-plymouth.png

          # Sisteme kopyala
          sudo mkdir -p /mnt/flos/usr/share/pixmaps
          sudo mkdir -p /mnt/flos/usr/share/backgrounds
          sudo mkdir -p /mnt/flos/usr/share/calamares/branding/flos
          sudo cp /tmp/flos-logo.png /mnt/flos/usr/share/pixmaps/flos-logo.png
          sudo cp /tmp/flos-wallpaper.png /mnt/flos/usr/share/backgrounds/flos-wallpaper.png
          sudo cp /tmp/flos-logo.png /mnt/flos/usr/share/calamares/branding/flos/flos-logo.png
          sudo cp /tmp/flos-plymouth.png /mnt/flos/usr/share/pixmaps/flos-plymouth.png

      - name: OS Adi FlOS 1
        run: |
          sudo tee /mnt/flos/etc/os-release > /dev/null << 'EOF'
          PRETTY_NAME="FlOS 1"
          NAME="FlOS"
          VERSION="1"
          VERSION_ID="1"
          ID=flos
          ID_LIKE=debian
          HOME_URL="https://github.com"
          LOGO=flos-logo
          EOF
          echo "flos" | sudo tee /mnt/flos/etc/hostname
          printf '127.0.0.1\tlocalhost\n127.0.1.1\tflos\n' | sudo tee /mnt/flos/etc/hosts

      - name: Plymouth Boot Splash
        run: |
          sudo mkdir -p /mnt/flos/usr/share/plymouth/themes/flos
          sudo cp /tmp/flos-plymouth.png /mnt/flos/usr/share/plymouth/themes/flos/flos.png

          sudo tee /mnt/flos/usr/share/plymouth/themes/flos/flos.plymouth > /dev/null << 'EOF'
          [Plymouth Theme]
          Name=FlOS
          Description=FlOS 1 Boot Theme
          ModuleName=script
          EOF

          sudo tee /mnt/flos/usr/share/plymouth/themes/flos/flos.script > /dev/null << 'EOF'
          bg = SpriteImage(Image.Scale(Image("flos.png"), 300, 300));
          s = Sprite(bg);
          s.SetX(Window.GetWidth() / 2 - 150);
          s.SetY(Window.GetHeight() / 2 - 150);
          EOF

          sudo chroot /mnt/flos /bin/bash -c "
            update-alternatives --install /usr/share/plymouth/themes/default.plymouth default.plymouth /usr/share/plymouth/themes/flos/flos.plymouth 100 2>/dev/null || true
          "

      - name: Neofetch FlOS ASCII Logo
        run: |
          sudo mkdir -p /mnt/flos/etc/neofetch
          sudo tee /mnt/flos/etc/neofetch/flos.ascii > /dev/null << 'EOF'
          ${c2}       .:::::::::::.
          ${c2}    .:::::::::::::::::.
          ${c2}  :::::::::::::::::::::::
          ${c2} :::::  ${c1}███${c2}  ${c1}██${c2}  ${c1}█${c2}  ::::::
          ${c2} :::::  ${c1}█${c2}    ${c1}██${c2}  ${c1}█${c2}  ::::::
          ${c2} :::::  ${c1}██${c2}   ${c1}██${c2}  ${c1}█${c2}  ::::::
          ${c2} :::::  ${c1}█${c2}    ${c1}██${c2}  ${c1}█${c2}  ::::::
          ${c2} :::::  ${c1}███${c2}  ${c1}██${c2}  ${c1}███${c2} ::::::
          ${c2}  :::::::::::::::::::::::
          ${c2}    ':::::::::::::::::'
          ${c2}       ':::::::::::'
          EOF

          sudo tee /mnt/flos/etc/neofetch/config.conf > /dev/null << 'EOF'
          print_info() {
              info title
              info underline
              info "OS"       distro
              info "Kernel"   kernel
              info "Uptime"   uptime
              info "Packages" packages
              info "Shell"    shell
              info "CPU"      cpu
              info "Memory"   memory
          }
          image_backend="ascii"
          ascii_colors=(2 15)
          ascii_bold="on"
          title_fqdn="off"
          distro_shorthand="off"
          EOF

          sudo tee -a /mnt/flos/etc/bash.bashrc > /dev/null << 'EOF'
          neofetch --ascii /etc/neofetch/flos.ascii --ascii_colors 2 15 --config /etc/neofetch/config.conf
          EOF

      - name: KDE Duvar Kagidi Ayarla
        run: |
          sudo mkdir -p /mnt/flos/etc/skel/.config
          sudo tee /mnt/flos/etc/skel/.config/plasma-org.kde.plasma.desktop-appletsrc > /dev/null << 'EOF'
          [Containments][1][Wallpaper][org.kde.image][General]
          Image=/usr/share/backgrounds/flos-wallpaper.png
          EOF

      - name: Calamares Yapilandir
        run: |
          sudo mkdir -p /mnt/flos/etc/calamares/modules

          sudo tee /mnt/flos/etc/calamares/settings.conf > /dev/null << 'EOF'
          modules-search: [ local, /usr/lib/calamares/modules ]
          sequence:
            - show:
              - welcome
              - locale
              - keyboard
              - partition
              - users
              - summary
            - exec:
              - partition
              - mount
              - unpackfs
              - machineid
              - fstab
              - locale
              - keyboard
              - localecfg
              - users
              - networkcfg
              - hwclock
              - grubcfg
              - bootloader
              - initramfscfg
              - initramfs
              - removeuser
              - umount
            - show:
              - finished
          branding: flos
          prompt-install: false
          EOF

          sudo tee /mnt/flos/usr/share/calamares/branding/flos/branding.desc > /dev/null << 'EOF'
          componentName: flos
          welcomeStyleCalamares: true
          welcomeExpandingLogo: true
          strings:
              productName: "FlOS"
              shortProductName: "FlOS"
              version: "1"
              shortVersion: "1"
              versionedName: "FlOS 1"
              shortVersionedName: "FlOS 1"
              bootloaderEntryName: "FlOS"
              productUrl: "https://github.com"
              supportUrl: "https://github.com"
              knownIssuesUrl: "https://github.com"
              releaseNotesUrl: "https://github.com"
          images:
              productLogo: "flos-logo.png"
              productIcon: "flos-logo.png"
              productWelcome: "flos-logo.png"
          slideshow: "show.qml"
          style:
              sidebarBackground: "#0d1117"
              sidebarText: "#ffffff"
              sidebarTextCurrent: "#ffffff"
              sidebarTextSelect: "#4CAF50"
              sidebarBackgroundSelected: "#1a3a1a"
          EOF

          sudo tee /mnt/flos/usr/share/calamares/branding/flos/show.qml > /dev/null << 'EOF'
          import QtQuick 2.0
          import calamares.slideshow 1.0
          Presentation {
              Slide {
                  Rectangle {
                      anchors.fill: parent
                      color: "#0d1117"
                      Image {
                          anchors.centerIn: parent
                          anchors.verticalCenterOffset: -40
                          source: "flos-logo.png"
                          width: 180
                          height: 180
                          fillMode: Image.PreserveAspectFit
                      }
                      Text {
                          anchors.horizontalCenter: parent.horizontalCenter
                          anchors.bottom: parent.bottom
                          anchors.bottomMargin: 80
                          text: "FlOS 1 kuruluyor, lutfen bekleyin..."
                          color: "#4CAF50"
                          font.pixelSize: 20
                          font.bold: true
                      }
                  }
              }
          }
          EOF

          sudo tee /mnt/flos/etc/calamares/modules/unpackfs.conf > /dev/null << 'EOF'
          unpack:
            - source: /run/live/medium/live/filesystem.squashfs
              sourcefs: squashfs
              destination: ""
          EOF

          sudo tee /mnt/flos/etc/calamares/modules/removeuser.conf > /dev/null << 'EOF'
          username: user
          EOF

          sudo tee /mnt/flos/etc/calamares/modules/bootloader.conf > /dev/null << 'EOF'
          efiBootLoader: "grub"
          kernel: "/vmlinuz"
          img: "/initrd.img"
          kernelLine: " quiet splash"
          timeout: "5"
          grubInstall: "grub-install"
          grubMkconfig: "grub-mkconfig"
          grubCfg: "/boot/grub/grub.cfg"
          grubProbe: "grub-probe"
          efiBootMgr: "efibootmgr"
          installEFI: true
          EOF

      - name: Live Kullanici Olustur
        run: |
          sudo chroot /mnt/flos /bin/bash -c "
            useradd -m -s /bin/bash -G sudo,video,audio,input,netdev user
            echo 'user:flos' | chpasswd
            echo 'root:flos' | chpasswd
          "

      - name: Masaustu Kurulum Kisayolu
        run: |
          sudo mkdir -p /mnt/flos/home/user/Desktop
          sudo tee /mnt/flos/home/user/Desktop/install-flos.desktop > /dev/null << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=FlOS 1 Kur
          Comment=FlOS 1 sistemini diske yukle
          Exec=pkexec calamares
          Icon=/usr/share/pixmaps/flos-logo.png
          Terminal=false
          Categories=System;
          EOF
          sudo chmod +x /mnt/flos/home/user/Desktop/install-flos.desktop
          sudo chroot /mnt/flos chown -R user:user /home/user/Desktop

      - name: SDDM Otomatik Giris
        run: |
          sudo mkdir -p /mnt/flos/etc/sddm.conf.d
          sudo tee /mnt/flos/etc/sddm.conf.d/autologin.conf > /dev/null << 'EOF'
          [Autologin]
          User=user
          Session=plasma
          EOF

      - name: Klavye Ayari
        run: |
          sudo mkdir -p /mnt/flos/etc/X11/xorg.conf.d
          sudo tee /mnt/flos/etc/X11/xorg.conf.d/00-keyboard.conf > /dev/null << 'EOF'
          Section "InputClass"
              Identifier "keyboard"
              MatchIsKeyboard "yes"
              Option "XkbLayout" "tr"
          EndSection
          EOF

      - name: Servisleri Etkinlestir
        run: |
          sudo chroot /mnt/flos systemctl enable sddm
          sudo chroot /mnt/flos systemctl enable NetworkManager

      - name: Locale
        run: |
          echo 'en_US.UTF-8 UTF-8' | sudo tee /mnt/flos/etc/locale.gen
          sudo chroot /mnt/flos locale-gen
          echo 'LANG=en_US.UTF-8' | sudo tee /mnt/flos/etc/locale.conf

      - name: Initramfs Guncelle
        run: |
          sudo chroot /mnt/flos update-initramfs -u -k all

      - name: ISO Dizin Yapisi
        run: mkdir -p iso_root/{live,boot/grub}

      - name: SquashFS Olustur
        run: |
          sudo mksquashfs /mnt/flos iso_root/live/filesystem.squashfs \
            -e boot -comp xz -noappend

      - name: Kernel ve Initrd Kopyala
        run: |
          sudo cp $(ls /mnt/flos/boot/vmlinuz-* | sort | tail -1) iso_root/live/vmlinuz
          sudo cp $(ls /mnt/flos/boot/initrd.img-* | sort | tail -1) iso_root/live/initrd.img

      - name: GRUB Config
        run: |
          sudo tee iso_root/boot/grub/grub.cfg > /dev/null << 'EOF'
          set default=0
          set timeout=5
          menuentry "FlOS 1 - KDE Plasma" {
              linux  /live/vmlinuz boot=live components quiet splash
              initrd /live/initrd.img
          }
          EOF

      - name: ISO Olustur
        run: sudo grub-mkrescue -o FlOS-1-KDE.iso iso_root

      - name: ISO Boyutu
        run: ls -lh FlOS-1-KDE.iso

      - name: ISO Yukle
        uses: actions/upload-artifact@v4
        with:
          name: FlOS-1-KDE-ISO
          path: FlOS-1-KDE.iso
          retention-days: 7
