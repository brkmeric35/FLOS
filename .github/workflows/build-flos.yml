name: Build FlOS ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Araclari Kur
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y debootstrap xorriso squashfs-tools grub-pc-bin grub-efi-amd64-bin mtools isolinux

      - name: Debian Base Sistem
        run: |
          sudo debootstrap --arch=amd64 bookworm /mnt/flos http://deb.debian.org/debian

      - name: Paketleri Kur
        run: |
          sudo cp /etc/resolv.conf /mnt/flos/etc/resolv.conf
          sudo chroot /mnt/flos apt-get update -qq
          sudo chroot /mnt/flos apt-get install -y --no-install-recommends \
            linux-image-amd64 grub-pc neofetch bash coreutils util-linux \
            procps systemd systemd-sysv login passwd sudo openssh-server \
            net-tools iproute2 open-vm-tools vim-tiny tmux ca-certificates locales

      - name: OS Adini FlOS Yap
        run: |
          printf 'PRETTY_NAME="FlOS"\nNAME="FlOS"\nVERSION="1.0"\nID=flos\nID_LIKE=debian\nVERSION_ID="1.0"\nLOGO=debian-logo\n' | sudo tee /mnt/flos/etc/os-release

      - name: Hostname Ayarla
        run: echo 'flos' | sudo tee /mnt/flos/etc/hostname

      - name: Neofetch Yapilandir
        run: |
          sudo mkdir -p /mnt/flos/etc/neofetch
          printf "print_info() {\n    info title\n    info underline\n    info 'OS' distro\n    info 'Kernel' kernel\n    info 'Uptime' uptime\n    info 'Packages' packages\n    info 'Shell' shell\n    info 'CPU' cpu\n    info 'Memory' memory\n}\nascii_distro='Debian'\ndistro_shorthand='off'\n" | sudo tee /mnt/flos/etc/neofetch/config.conf
          echo 'neofetch --config /etc/neofetch/config.conf' | sudo tee -a /mnt/flos/etc/profile

      - name: Root Sifre ve Autologin
        run: |
          sudo chroot /mnt/flos /bin/bash -c "echo 'root:flos' | chpasswd"
          sudo mkdir -p "/mnt/flos/etc/systemd/system/getty@tty1.service.d"
          printf '[Service]\nExecStart=\nExecStart=-/sbin/agetty --autologin root --noclear %%I $TERM\n' | sudo tee "/mnt/flos/etc/systemd/system/getty@tty1.service.d/override.conf"

      - name: fstab ve Locale
        run: |
          printf '/dev/sda1  /     ext4  errors=remount-ro  0  1\n/dev/sda2  none  swap  sw  0  0\n' | sudo tee /mnt/flos/etc/fstab
          echo 'en_US.UTF-8 UTF-8' | sudo tee /mnt/flos/etc/locale.gen
          sudo chroot /mnt/flos locale-gen
          echo 'LANG=en_US.UTF-8' | sudo tee /mnt/flos/etc/locale.conf

      - name: SquashFS Olustur
        run: |
          mkdir -p iso_root/live
          sudo mksquashfs /mnt/flos iso_root/live/filesystem.squashfs -comp xz -noappend

      - name: Kernel ve Initrd Kopyala
        run: |
          mkdir -p iso_root/boot/grub
          sudo cp $(ls /mnt/flos/boot/vmlinuz-* | head -1) iso_root/boot/vmlinuz
          sudo cp $(ls /mnt/flos/boot/initrd.img-* | head -1) iso_root/boot/initrd.img

      - name: GRUB Config
        run: |
          printf 'set default=0\nset timeout=3\nmenuentry "FlOS" {\n    linux  /boot/vmlinuz boot=live quiet\n    initrd /boot/initrd.img\n}\n' | sudo tee iso_root/boot/grub/grub.cfg

      - name: ISO Olustur
        run: sudo grub-mkrescue -o FlOS.iso iso_root -- -volid "FlOS"

      - name: ISO Yukle
        uses: actions/upload-artifact@v4
        with:
          name: FlOS-ISO
          path: FlOS.iso
          retention-days: 7
