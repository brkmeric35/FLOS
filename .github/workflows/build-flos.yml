name: Build FlOS 1 KDE ISO

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Repoyu Cek
        uses: actions/checkout@v4

      - name: Araclari Kur
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            debootstrap xorriso squashfs-tools \
            grub-pc-bin grub-efi-amd64-bin mtools isolinux syslinux-common imagemagick

      - name: Debian Base Sistem Olustur
        run: |
          sudo debootstrap --arch=amd64 bookworm /mnt/flos http://deb.debian.org/debian

      - name: Gelismis Sources List Ayarla
        run: |
          sudo tee /mnt/flos/etc/apt/sources.list > /dev/null << 'EOF'
          deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
          deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware
          EOF

      - name: Sanal Dosya Sistemlerini Bagla
        run: |
          sudo mount --bind /dev /mnt/flos/dev
          sudo mount --bind /dev/pts /mnt/flos/dev/pts
          sudo mount -t proc proc /mnt/flos/proc
          sudo mount -t sysfs sys /mnt/flos/sys

      - name: Temel Paketleri Kur
        run: |
          sudo cp /etc/resolv.conf /mnt/flos/etc/resolv.conf
          sudo chroot /mnt/flos apt-get update -qq
          sudo chroot /mnt/flos apt-get install -y \
            linux-image-amd64 \
            live-boot \
            live-boot-initramfs-tools \
            systemd-sysv \
            dbus \
            locales \
            login \
            passwd \
            sudo \
            bash \
            ca-certificates \
            network-manager \
            openssh-server \
            open-vm-tools \
            open-vm-tools-desktop \
            plymouth \
            plymouth-themes \
            grub-pc \
            parted \
            os-prober \
            efibootmgr

      - name: KDE Plasma ve Sistem Araclarini Kur
        run: |
          sudo chroot /mnt/flos apt-get install -y \
            kde-plasma-desktop \
            sddm \
            konsole \
            dolphin \
            kate \
            ark \
            gwenview \
            plasma-nm \
            plasma-pa \
            kscreen \
            firefox-esr \
            fonts-noto \
            papirus-icon-theme \
            neofetch \
            calamares \
            calamares-settings-debian \
            python3 \
            python3-yaml \
            kinfocenter \
            w3m-img

      - name: Debian Markasini Temizle
        run: |
          sudo chroot /mnt/flos apt-get remove -y desktop-base 2>/dev/null || true
          sudo rm -rf /mnt/flos/usr/share/desktop-base 2>/dev/null || true
          # Varsayilan calamares kisayollarini kökten temizle (Debian'in kendi koyduklarini siler)
          sudo rm -f /mnt/flos/usr/share/applications/calamares.desktop 2>/dev/null || true
          sudo rm -f /mnt/flos/etc/skel/Desktop/calamares.desktop 2>/dev/null || true

      - name: Logo ve Duvar Kagidi Entegrasyonu
        run: |
          if [ ! -f flos-logo.png ]; then
            convert -size 512x512 xc:transparent -gravity center -pointsize 80 -fill "#4CAF50" -draw "text 0,0 'FlOS'" /tmp/flos-logo.png
          else
            cp flos-logo.png /tmp/flos-logo.png
          fi
          
          convert -size 1920x1080 xc:#0d1117 \
            \( /tmp/flos-logo.png -resize 400x400 \) \
            -gravity center -composite /tmp/flos-wallpaper.png
          convert /tmp/flos-logo.png -resize 256x256 /tmp/flos-plymouth.png

          sudo mkdir -p /mnt/flos/usr/share/pixmaps
          sudo mkdir -p /mnt/flos/usr/share/backgrounds
          sudo mkdir -p /mnt/flos/usr/share/calamares/branding/flos
          
          sudo mkdir -p /mnt/flos/usr/share/plasma/look-and-feel/flos.lookandfeel
          sudo mkdir -p /mnt/flos/usr/share/plasma/look-and-feel/flos.lookandfeel/contents/logos
          
          sudo cp /tmp/flos-logo.png /mnt/flos/usr/share/pixmaps/flos-logo.png
          sudo cp /tmp/flos-wallpaper.png /mnt/flos/usr/share/backgrounds/flos-wallpaper.png
          sudo cp /tmp/flos-logo.png /mnt/flos/usr/share/calamares/branding/flos/flos-logo.png
          sudo cp /tmp/flos-plymouth.png /mnt/flos/usr/share/pixmaps/flos-plymouth.png
          
          sudo cp /tmp/flos-logo.png /mnt/flos/usr/share/plasma/look-and-feel/flos.lookandfeel/contents/logos/distro.png

      - name: Dagitim Kimligini Tanimla
        run: |
          sudo tee /mnt/flos/etc/os-release > /dev/null << 'EOF'
          PRETTY_NAME="FlOS 1"
          NAME="FlOS"
          VERSION="1"
          VERSION_ID="1"
          ID=flos
          ID_LIKE=debian
          HOME_URL="https://github.com/brkmeric35/FLOS"
          BUG_REPORT_URL="https://github.com/brkmeric35/FLOS/issues"
          SUPPORT_URL="https://github.com/brkmeric35/FLOS"
          LOGO=flos-logo
          EOF
          echo "flos" | sudo tee /mnt/flos/etc/hostname
          printf '127.0.0.1\tlocalhost\n127.0.1.1\tflos\n' | sudo tee /mnt/flos/etc/hosts

      - name: Plymouth Acilis Ekrani Ayarla
        run: |
          sudo mkdir -p /mnt/flos/usr/share/plymouth/themes/flos
          sudo cp /tmp/flos-plymouth.png /mnt/flos/usr/share/plymouth/themes/flos/flos.png
          sudo tee /mnt/flos/usr/share/plymouth/themes/flos/flos.plymouth > /dev/null << 'EOF'
          [Plymouth Theme]
          Name=FlOS
          Description=FlOS 1 Boot Theme
          ModuleName=script
          EOF
          sudo tee /mnt/flos/usr/share/plymouth/themes/flos/flos.script > /dev/null << 'EOF'
          bg = SpriteImage(Image.Scale(Image("flos.png"), 300, 300));
          s = Sprite(bg);
          s.SetX(Window.GetWidth() / 2 - 150);
          s.SetY(Window.GetHeight() / 2 - 150);
          EOF
          sudo chroot /mnt/flos update-alternatives --install /usr/share/plymouth/themes/default.plymouth default.plymouth /usr/share/plymouth/themes/flos/flos.plymouth 100

      - name: Neofetch Foto-Logo Ayari
        run: |
          sudo mkdir -p /mnt/flos/etc/neofetch
          sudo tee /mnt/flos/etc/neofetch/config.conf > /dev/null << 'EOF'
          print_info() {
              info title
              info underline
              info "OS"        distro
              info "Kernel"    kernel
              info "Uptime"    uptime
              info "Packages" packages
              info "Shell"     shell
              info "CPU"      cpu
              info "Memory"    memory
          }
          image_backend="w3m"
          image_source="/usr/share/pixmaps/flos-logo.png"
          image_size="250px"
          image_loop="off"
          crop_mode="normal"
          crop_offset="center"
          EOF
          sudo tee -a /mnt/flos/etc/bash.bashrc > /dev/null << 'EOF'
          neofetch --config /etc/neofetch/config.conf
          EOF

      - name: Varsayilan KDE Duvar Kagidi
        run: |
          sudo mkdir -p /mnt/flos/etc/skel/.config
          sudo tee /mnt/flos/etc/skel/.config/plasma-org.kde.plasma.desktop-appletsrc > /dev/null << 'EOF'
          [Containments][1][Wallpaper][org.kde.image][General]
          Image=/usr/share/backgrounds/flos-wallpaper.png
          EOF

      - name: KDE Look and Feel Paketini Olustur
        run: |
          sudo tee /mnt/flos/usr/share/plasma/look-and-feel/flos.lookandfeel/metadata.desktop > /dev/null << 'EOF'
          [Desktop Entry]
          Comment=FlOS 1 Look and Feel Package
          Name=FlOS 1
          Type=Service
          X-KDE-ServiceTypes=Plasma/LookAndFeel
          X-KDE-PluginInfo-Author=FlOS Project
          X-KDE-PluginInfo-Email=github.com
          X-KDE-PluginInfo-Name=flos.lookandfeel
          X-KDE-PluginInfo-Version=1
          X-KDE-PluginInfo-Website=https://github.com/brkmeric35/FLOS
          X-KDE-PluginInfo-License=GPL
          EOF

      - name: Calamares Kurulum Sihirbazi Yapilandirmasi
        run: |
          sudo mkdir -p /mnt/flos/etc/calamares/modules

          sudo tee /mnt/flos/etc/calamares/settings.conf > /dev/null << 'EOF'
          modules-search: [ local, /usr/lib/calamares/modules ]
          sequence:
            - show:
              - welcome
              - locale
              - keyboard
              - partition
              - users
              - summary
            - exec:
              - partition
              - mount
              - unpackfs
              - machineid
              - fstab
              - locale
              - keyboard
              - localecfg
              - users
              - networkcfg
              - hwclock
              - grubcfg
              - bootloader
              - initramfscfg
              - initramfs
              - removeuser
              - umount
            - show:
              - finished
          branding: flos
          prompt-install: false
          EOF

          sudo tee /mnt/flos/usr/share/calamares/branding/flos/branding.desc > /dev/null << 'EOF'
          componentName: flos
          welcomeStyleCalamares: true
          welcomeExpandingLogo: true
          strings:
              productName: "FlOS"
              shortProductName: "FlOS"
              version: "1"
              shortVersion: "1"
              versionedName: "FlOS 1"
              shortVersionedName: "FlOS 1"
              bootloaderEntryName: "FlOS"
              productUrl: "https://github.com/brkmeric35/FLOS"
              supportUrl: "https://github.com/brkmeric35/FLOS"
              knownIssuesUrl: "https://github.com/brkmeric35/FLOS/issues"
              releaseNotesUrl: "https://github.com/brkmeric35/FLOS"
          images:
              productLogo: "flos-logo.png"
              productIcon: "flos-logo.png"
              productWelcome: "flos-logo.png"
          slideshow: "show.qml"
          style:
              sidebarBackground: "#0d1117"
              sidebarText: "#ffffff"
              sidebarTextCurrent: "#ffffff"
              sidebarTextSelect: "#4CAF50"
              sidebarBackgroundSelected: "#1a3a1a"
          EOF

          sudo tee /mnt/flos/usr/share/calamares/branding/flos/show.qml > /dev/null << 'EOF'
          import QtQuick 2.0
          import calamares.slideshow 1.0
          Presentation {
              Slide {
                  Rectangle {
                      anchors.fill: parent
                      color: "#0d1117"
                      Image {
                          anchors.centerIn: parent
                          anchors.verticalCenterOffset: -40
                          source: "flos-logo.png"
                          width: 180
                          height: 180
                          fillMode: Image.PreserveAspectFit
                      }
                      Text {
                          anchors.horizontalCenter: parent.horizontalCenter
                          anchors.bottom: parent.bottom
                          anchors.bottomMargin: 80
                          text: "FlOS 1 kuruluyor, lutfen bekleyin..."
                          color: "#4CAF50"
                          font.pixelSize: 20
                          font.bold: true
                      }
                  }
              }
          }
          EOF

          sudo tee /mnt/flos/etc/calamares/modules/unpackfs.conf > /dev/null << 'EOF'
          unpack:
            - source: /run/live/medium/live/filesystem.squashfs
              sourcefs: squashfs
              destination: ""
          EOF

          sudo tee /mnt/flos/etc/calamares/modules/removeuser.conf > /dev/null << 'EOF'
          username: user
          EOF

          sudo tee /mnt/flos/etc/calamares/modules/bootloader.conf > /dev/null << 'EOF'
          efiBootLoader: "grub"
          kernel: "/vmlinuz"
          img: "/initrd.img"
          fallback: "/initrd.img"
          kernelLine: " quiet splash"
          timeout: "5"
          grubInstall: "grub-install"
          grubMkconfig: "grub-mkconfig"
          grubCfg: "/boot/grub/grub.cfg"
          grubProbe: "grub-probe"
          efiBootMgr: "efibootmgr"
          installEFI: false
          canBeResized: true
          EOF

          sudo tee /mnt/flos/etc/calamares/modules/grubcfg.conf > /dev/null << 'EOF'
          overwrite: true
          keepDistributor: false
          distributor: "FlOS"
          EOF

      - name: Calamares Sifresiz Yetki Tanimi (Polkit Guncellemesi)
        run: |
          sudo mkdir -p /mnt/flos/etc/polkit-1/rules.d
          sudo tee /mnt/flos/etc/polkit-1/rules.d/80-calamares.rules > /dev/null << 'EOF'
          polkit.addRule(function(action, subject) {
              if ((action.id == "org.debian.pkexec.calamares" || action.id == "org.calamares.calamares") &&
                  subject.user == "user") {
                  return polkit.Result.YES;
              }
          });
          EOF
          sudo chmod 700 /mnt/flos/etc/polkit-1/rules.d
          sudo chown -R root:root /mnt/flos/etc/polkit-1/rules.d

      - name: Sifresiz Sudo Yetkilendirmesi (NOPASSWD)
        run: |
          sudo mkdir -p /mnt/flos/etc/sudoers.d
          echo "user ALL=(ALL) NOPASSWD:ALL" | sudo tee /mnt/flos/etc/sudoers.d/live-user
          sudo chmod 0440 /mnt/flos/etc/sudoers.d/live-user

      - name: Live Kullanici Olustur
        run: |
          sudo chroot /mnt/flos /bin/bash -c "
            useradd -m -s /bin/bash -G sudo,video,audio,input,netdev user
            echo 'user:flos' | chpasswd
            echo 'root:flos' | chpasswd
          "

      - name: Masaustu Kurulum Kisayolu
        run: |
          sudo mkdir -p /mnt/flos/home/user/Desktop
          sudo tee /mnt/flos/home/user/Desktop/install-flos.desktop > /dev/null << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=FlOS 1 Kur
          Comment=FlOS 1 sistemini diske yukle
          Exec=pkexec calamares
          Icon=/usr/share/pixmaps/flos-logo.png
          Terminal=false
          Categories=System;
          EOF
          sudo chmod +x /mnt/flos/home/user/Desktop/install-flos.desktop
          sudo chroot /mnt/flos chown -R user:user /home/user/Desktop

      - name: SDDM Otomatik Giris Ayari
        run: |
          sudo mkdir -p /mnt/flos/etc/sddm.conf.d
          sudo tee /mnt/flos/etc/sddm.conf.d/autologin.conf > /dev/null << 'EOF'
          [Autologin]
          User=user
          Session=plasma
          EOF

      - name: Turkce Klavye Duzeni Ayarla
        run: |
          sudo mkdir -p /mnt/flos/etc/X11/xorg.conf.d
          sudo tee /mnt/flos/etc/X11/xorg.conf.d/00-keyboard.conf > /dev/null << 'EOF'
          Section "InputClass"
              Identifier "keyboard"
              MatchIsKeyboard "yes"
              Option "XkbLayout" "tr"
          EndSection
          EOF

      - name: Sistem Servislerini Aktiflestir
        run: |
          sudo chroot /mnt/flos systemctl enable sddm
          sudo chroot /mnt/flos systemctl enable NetworkManager

      - name: Sistem Dil Ayarlari
        run: |
          echo 'en_US.UTF-8 UTF-8' | sudo tee /mnt/flos/etc/locale.gen
          sudo chroot /mnt/flos locale-gen
          echo 'LANG=en_US.UTF-8' | sudo tee /mnt/flos/etc/locale.conf

      - name: Initramfs Guncelle
        run: |
          sudo chroot /mnt/flos update-initramfs -u -k all

      - name: Temizlik ve Disk Alani Optimizasyonu
        run: |
          sudo chroot /mnt/flos apt-get clean
          sudo rm -rf /mnt/flos/var/lib/apt/lists/*

      - name: Sanal Dosya Sistemlerini Ayir
        run: |
          sudo umount -lf /mnt/flos/dev/pts || true
          sudo umount -lf /mnt/flos/dev || true
          sudo umount -lf /mnt/flos/proc || true
          sudo umount -lf /mnt/flos/sys || true

      - name: ISO Dizin Yapisi Olustur
        run: mkdir -p iso_root/{live,boot/grub}

      - name: SquashFS Sikistirilmis Imajı Olustur
        run: |
          sudo mksquashfs /mnt/flos iso_root/live/filesystem.squashfs \
            -comp xz -noappend

      - name: Kernel ve Initrd Cekirdeklerini Kopyala
        run: |
          sudo cp $(ls /mnt/flos/boot/vmlinuz-* | sort | tail -1) iso_root/live/vmlinuz
          sudo cp $(ls /mnt/flos/boot/initrd.img-* | sort | tail -1) iso_root/live/initrd.img

      - name: Canli Sistem GRUB Menusu Olustur
        run: |
          sudo tee iso_root/boot/grub/grub.cfg > /dev/null << 'EOF'
          set default=0
          set timeout=5
          menuentry "FlOS 1 - KDE Plasma (Canli Sistem)" {
              linux  /live/vmlinuz boot=live components quiet splash
              initrd /live/initrd.img
          }
          EOF

      - name: Hibrit ISO Imajini Paketle
        run: sudo grub-mkrescue -o FlOS-1-KDE.iso iso_root

      - name: ISO Boyutunu Kontrol Et
        run: ls -lh FlOS-1-KDE.iso

      - name: ISO Dosyasini Artifact Olarak Yukle
        uses: actions/upload-artifact@v4
        with:
          name: FlOS-1-KDE-ISO
          path: FlOS-1-KDE.iso
          retention-days: 7
