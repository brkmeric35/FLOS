name: Build FlOS ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Araclari Kur
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            debootstrap \
            xorriso \
            squashfs-tools \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            isolinux \
            syslinux-common

      - name: Debian Base Sistem
        run: |
          sudo debootstrap --arch=amd64 bookworm /mnt/flos http://deb.debian.org/debian

      - name: Paketleri Kur
        run: |
          sudo cp /etc/resolv.conf /mnt/flos/etc/resolv.conf

          # sources.list ayarla
          sudo tee /mnt/flos/etc/apt/sources.list > /dev/null << 'EOF'
          deb http://deb.debian.org/debian bookworm main contrib non-free
          deb http://deb.debian.org/debian bookworm-updates main contrib non-free
          EOF

          sudo chroot /mnt/flos apt-get update -qq

          # live-boot kritik paket!
          sudo chroot /mnt/flos apt-get install -y \
            linux-image-amd64 \
            live-boot \
            live-boot-initramfs-tools \
            systemd-sysv \
            bash \
            neofetch \
            locales \
            login \
            passwd \
            sudo \
            openssh-server \
            net-tools \
            iproute2 \
            open-vm-tools \
            vim-tiny \
            tmux \
            ca-certificates \
            dbus

      - name: OS Adini FlOS Yap
        run: |
          printf 'PRETTY_NAME="FlOS"\nNAME="FlOS"\nVERSION="1.0"\nID=flos\nID_LIKE=debian\nVERSION_ID="1.0"\nLOGO=debian-logo\n' | sudo tee /mnt/flos/etc/os-release

      - name: Hostname
        run: echo 'flos' | sudo tee /mnt/flos/etc/hostname

      - name: Hosts Dosyasi
        run: |
          printf '127.0.0.1\tlocalhost\n127.0.1.1\tflos\n' | sudo tee /mnt/flos/etc/hosts

      - name: Neofetch Yapilandir
        run: |
          sudo mkdir -p /mnt/flos/etc/neofetch
          sudo tee /mnt/flos/etc/neofetch/config.conf > /dev/null << 'NEOF'
          print_info() {
              info title
              info underline
              info "OS" distro
              info "Kernel" kernel
              info "Uptime" uptime
              info "Packages" packages
              info "Shell" shell
              info "CPU" cpu
              info "Memory" memory
          }
          ascii_distro="Debian"
          distro_shorthand="off"
          NEOF
          echo 'neofetch --config /etc/neofetch/config.conf' | sudo tee -a /mnt/flos/etc/bash.bashrc

      - name: Root Sifre
        run: |
          sudo chroot /mnt/flos /bin/bash -c "echo 'root:flos' | chpasswd"

      - name: Autologin root tty1
        run: |
          sudo mkdir -p "/mnt/flos/etc/systemd/system/getty@tty1.service.d"
          sudo tee "/mnt/flos/etc/systemd/system/getty@tty1.service.d/override.conf" > /dev/null << 'EOF'
          [Service]
          ExecStart=
          ExecStart=-/sbin/agetty --autologin root --noclear %I $TERM
          EOF

      - name: Locale
        run: |
          echo 'en_US.UTF-8 UTF-8' | sudo tee /mnt/flos/etc/locale.gen
          sudo chroot /mnt/flos locale-gen
          echo 'LANG=en_US.UTF-8' | sudo tee /mnt/flos/etc/locale.conf

      - name: Initramfs Guncelle
        run: |
          sudo chroot /mnt/flos update-initramfs -u -k all

      - name: ISO Dizin Yapisi
        run: |
          mkdir -p iso_root/{live,boot/grub,EFI/boot}

      - name: SquashFS Olustur
        run: |
          sudo mksquashfs /mnt/flos iso_root/live/filesystem.squashfs \
            -e boot \
            -comp xz \
            -noappend

      - name: Kernel ve Initrd Kopyala
        run: |
          VMLINUZ=$(ls /mnt/flos/boot/vmlinuz-* | sort | tail -1)
          INITRD=$(ls /mnt/flos/boot/initrd.img-* | sort | tail -1)
          sudo cp "$VMLINUZ" iso_root/live/vmlinuz
          sudo cp "$INITRD" iso_root/live/initrd.img
          echo "Kernel: $VMLINUZ"
          echo "Initrd: $INITRD"

      - name: GRUB Config
        run: |
          sudo tee iso_root/boot/grub/grub.cfg > /dev/null << 'EOF'
          set default=0
          set timeout=5

          menuentry "FlOS" {
              linux  /live/vmlinuz boot=live components quiet
              initrd /live/initrd.img
          }
          EOF

      - name: ISO Olustur
        run: |
          sudo grub-mkrescue \
            -o FlOS.iso \
            iso_root \
            -- \
            -volid "FlOS" \
            -joliet \
            -rational-rock

      - name: ISO Boyutu
        run: ls -lh FlOS.iso

      - name: ISO Yukle
        uses: actions/upload-artifact@v4
        with:
          name: FlOS-ISO
          path: FlOS.iso
          retention-days: 7
