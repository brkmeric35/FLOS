name: Build FlOS KDE Plasma ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Araclari Kur
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            debootstrap xorriso squashfs-tools \
            grub-pc-bin grub-efi-amd64-bin mtools isolinux syslinux-common

      - name: Debian Base Sistem (sid)
        run: |
          sudo debootstrap --arch=amd64 sid /mnt/flos http://deb.debian.org/debian

      - name: Sources List
        run: |
          sudo tee /mnt/flos/etc/apt/sources.list > /dev/null << 'EOF'
          deb http://deb.debian.org/debian sid main contrib non-free non-free-firmware
          EOF

      - name: Temel Paketleri Kur
        run: |
          sudo cp /etc/resolv.conf /mnt/flos/etc/resolv.conf
          sudo chroot /mnt/flos apt-get update -qq
          sudo chroot /mnt/flos apt-get install -y \
            linux-image-amd64 \
            live-boot \
            live-boot-initramfs-tools \
            systemd-sysv \
            dbus \
            locales \
            login \
            passwd \
            sudo \
            bash \
            ca-certificates \
            network-manager \
            openssh-server \
            vim-tiny \
            tmux \
            fastfetch \
            open-vm-tools \
            open-vm-tools-desktop

      - name: KDE Plasma Kur
        run: |
          # --no-install-recommends seçeneği ISO boyutunu küçük tutar. 
          # Tam deneyim için 'kde-standard' veya 'kde-full' kullanabilirsiniz.
          sudo chroot /mnt/flos apt-get install -y \
            kde-plasma-desktop \
            sddm \
            konsole \
            dolphin \
            ark \
            gwenview \
            packagekit \
            pipewire \
            pipewire-audio \
            wireplumber \
            network-manager-gnome \
            plasma-nm

      - name: OS Adini FlOS Yap
        run: |
          printf 'PRETTY_NAME="FlOS"\nNAME="FlOS"\nVERSION="1.0"\nID=flos\nID_LIKE=debian\nVERSION_ID="1.0"\nLOGO=debian-logo\n' | sudo tee /mnt/flos/etc/os-release

      - name: Hostname ve Hosts
        run: |
          echo 'flos' | sudo tee /mnt/flos/etc/hostname
          printf '127.0.0.1\tlocalhost\n127.0.1.1\tflos\n' | sudo tee /mnt/flos/etc/hosts

      - name: Kullanici Olustur
        run: |
          sudo chroot /mnt/flos /bin/bash -c "
            useradd -m -s /bin/bash -G sudo,video,audio,input,render user
            echo 'user:flos' | chpasswd
            echo 'root:flos' | chpasswd
          "

      - name: Fastfetch Yapilandir
        run: |
          sudo mkdir -p /mnt/flos/home/user/.config/fastfetch
          sudo tee /mnt/flos/home/user/.config/fastfetch/config.jsonc > /dev/null << 'EOF'
          {
            "logo": { "source": "debian" },
            "modules": ["os","kernel","uptime","packages","shell","cpu","memory"]
          }
          EOF
          echo 'fastfetch' | sudo tee -a /mnt/flos/etc/bash.bashrc
          sudo chroot /mnt/flos chown -R user:user /home/user/.config/fastfetch

      - name: Servisleri Etkinlestir
        run: |
          sudo chroot /mnt/flos systemctl enable sddm
          sudo chroot /mnt/flos systemctl enable NetworkManager

      - name: Locale
        run: |
          echo 'en_US.UTF-8 UTF-8' | sudo tee /mnt/flos/etc/locale.gen
          sudo chroot /mnt/flos locale-gen
          echo 'LANG=en_US.UTF-8' | sudo tee /mnt/flos/etc/locale.conf

      - name: Initramfs Guncelle
        run: |
          sudo chroot /mnt/flos update-initramfs -u -k all

      - name: ISO Dizin Yapisi
        run: mkdir -p iso_root/{live,boot/grub}

      - name: SquashFS Olustur
        run: |
          sudo mksquashfs /mnt/flos iso_root/live/filesystem.squashfs \
            -e boot -comp xz -noappend

      - name: Kernel ve Initrd Kopyala
        run: |
          sudo cp $(ls /mnt/flos/boot/vmlinuz-* | sort | tail -1) iso_root/live/vmlinuz
          sudo cp $(ls /mnt/flos/boot/initrd.img-* | sort | tail -1) iso_root/live/initrd.img

      - name: GRUB Config
        run: |
          sudo tee iso_root/boot/grub/grub.cfg > /dev/null << 'EOF'
          set default=0
          set timeout=5
          menuentry "FlOS - KDE Plasma" {
              linux  /live/vmlinuz boot=live components quiet splash
              initrd /live/initrd.img
          }
          EOF

      - name: ISO Olustur
        run: sudo grub-mkrescue -o FlOS-KDE.iso iso_root

      - name: ISO Yukle
        uses: actions/upload-artifact@v4
        with:
          name: FlOS-KDE-ISO
          path: FlOS-KDE.iso
          retention-days: 7
